# slf4j-simple configuration for tests.
#
# Silences noise from third-party classloaders that is cosmetic on this project:
#   - Hadoop's Shell.<clinit> WARN about HADOOP_HOME / winutils.exe on Windows
#     (we never touch a real filesystem; the failure is caught internally).
#   - Parquet's InternalParquetRecordReader INFO chatter on every read.
#   - Avro's LogicalTypes WARN about unrecognised "uuid" logical type on some
#     avro versions.
#
# Keep the default level at WARN so genuine problems still surface.
org.slf4j.simpleLogger.defaultLogLevel=warn
org.slf4j.simpleLogger.log.org.apache.hadoop=error
org.slf4j.simpleLogger.log.org.apache.parquet=error
org.slf4j.simpleLogger.log.org.apache.avro.LogicalTypes=error
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showThreadName=false
